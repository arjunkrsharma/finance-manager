<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-3">
    <a class="navbar-brand" href="/dashboard">Finance Manager</a>

    <div>
        <a href="/dashboard" class="btn btn-light btn-sm">Dashboard</a>
        <a href="/history" class="btn btn-info btn-sm">History</a>
        <a href="/chart" class="btn btn-warning btn-sm">Chart</a>
        <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
    </div>
</nav>

<!-- MAIN CONTAINER -->
<div class="container mt-4">

    <h2 class="mb-4">Welcome, {{ name }} 👋</h2>

    <!-- SUMMARY CARDS -->
    <div class="row">

        <!-- INCOME -->
        <div class="col-md-4 mb-3">
            <div class="card p-3 text-white bg-success shadow">
                <h4>Income</h4>
                <h2>{{ income }}</h2>
            </div>
        </div>

        <!-- EXPENSE -->
        <div class="col-md-4 mb-3">
            <div class="card p-3 text-white bg-danger shadow">
                <h4>Expense</h4>
                <h2>{{ expense }}</h2>
            </div>
        </div>

        <!-- SAVINGS -->
        <div class="col-md-4 mb-3">
            <div class="card p-3 text-white bg-primary shadow">
                <h4>Savings</h4>
                <h2>{{ savings }}</h2>
            </div>
        </div>

    </div>

    <hr>

    <!-- QUICK ACTIONS -->
    <div class="row mt-4">

        <div class="col-md-6">
            <a href="/add-income" class="btn btn-success w-100 mb-2">
                + Add Income
            </a>
        </div>

        <div class="col-md-6">
            <a href="/add-expense" class="btn btn-danger w-100 mb-2">
                + Add Expense
            </a>
        </div>

    </div>

</div>

</body>
</html>
