<!DOCTYPE html>
<html>
<head>
    <title>History</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-3">
    <a class="navbar-brand" href="/dashboard">Finance Manager</a>

    <div>
        <a href="/dashboard" class="btn btn-light btn-sm">Dashboard</a>
        <a href="/chart" class="btn btn-warning btn-sm">Chart</a>
        <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
    </div>
</nav>

<div class="container mt-4">

    <!-- INCOME SECTION -->
    <h3 class="text-success">Income History</h3>

    <table class="table table-striped mt-3">
        <thead>
            <tr>
                <th>Amount</th>
                <th>Source</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody>
            {% for income in incomes %}
            <tr>
                <td>{{ income.amount }}</td>
                <td>{{ income.source }}</td>
                <td>
                    <a href="/delete-income/{{ income.id }}" class="btn btn-danger btn-sm">
                        Delete
                    </a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <hr>

    <!-- EXPENSE SECTION -->
    <h3 class="text-danger">Expense History</h3>

    <table class="table table-striped mt-3">
        <thead>
            <tr>
                <th>Amount</th>
                <th>Category</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody>
            {% for expense in expenses %}
            <tr>
                <td>{{ expense.amount }}</td>
                <td>{{ expense.category }}</td>
                <td>
                    <a href="/delete-expense/{{ expense.id }}" class="btn btn-danger btn-sm">
                        Delete
                    </a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</div>

</body>
</html>
